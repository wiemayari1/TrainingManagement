# ============================================
# Configuration Excellent Training - Backend
# ============================================

# ── Base de données ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/training_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Serveur ──────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2
jwt.expiration=86400000

# ── Email SMTP (Mailtrap Sandbox - pour les tests) ───────────────
# Récupère tes credentials sur : https://mailtrap.io → Email Testing → SMTP Settings
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=0a0d0dd5de3bda
spring.mail.password=116916b26ca1af
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Désactive la vérification SSL stricte (Mailtrap sandbox)
spring.mail.properties.mail.smtp.ssl.trust=sandbox.smtp.mailtrap.io

# URL du frontend (pour les liens dans les emails)
app.frontend.url=http://localhost:3000

# ── Logging ──────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.isi.gf=DEBUG
