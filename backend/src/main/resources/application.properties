# ============================================
# Configuration Excellent Training - Backend
# ============================================

# ── Base de données ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/training_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root123}

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Serveur ──────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2}
jwt.expiration=86400000

# ── Email SMTP ───────────────────────────────────────────────────
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME and MAIL_PASSWORD as environment
# variables (or override in application-local.properties).
# For local testing use a free Mailtrap inbox:
#   https://mailtrap.io → Inbox → Integration → SMTP → credentials
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:sandbox.smtp.mailtrap.io}

# URL du frontend (pour les liens dans les emails)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Logging ──────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.isi.gf=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.sun.mail=DEBUG
logging.level.javax.mail=DEBUG
