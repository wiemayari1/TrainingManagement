# ============================================
# Configuration Excellent Training - Backend
# SÉCURISÉ : toutes les valeurs sensibles via variables d'environnement
# ============================================

# ── Base de données ──────────────────────────────────────────────
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/training_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false&requireSSL=false}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Serveur ──────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api

# ── JWT ─────────────────────────────────────────────────────────
# OBLIGATOIRE : définir JWT_SECRET en production (min 64 chars, aléatoire)
# Générer : openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ── Email SMTP ──────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.default-encoding=UTF-8

app.mail.from=${MAIL_USERNAME}
app.mail.from-name=${MAIL_FROM_NAME:Excellent Training}
app.frontend.url=${FRONTEND_URL=https://excellent-training.duckdns.org}

# ── Logging ──────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.com.isi.gf=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.sun.mail=WARN
logging.level.javax.mail=WARN
logging.level.org.springframework.mail=WARN

cors.allowed-origins=https://excellent-training.duckdns.org