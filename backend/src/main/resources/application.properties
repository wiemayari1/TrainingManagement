# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/training_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=App@2026#Secure
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# update = Hibernate crée/modifie les tables automatiquement
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration
# context-path=/api → toutes les URLs backend = http://localhost:8081/api/...
server.port=8081
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2RXhjZWxsZW50VHJhaW5pbmdTZWNyZXRLZXkyMDI2
jwt.expiration=86400000

# Logging (moins verbeux)
logging.level.org.springframework.security=WARN
logging.level.com.isi.gf=INFO
