# ============================================================
# application.properties — AUCUN SECRET EN DUR
# Tous les secrets viennent de variables d'environnement
# Lancer avec : export JWT_SECRET=... ; mvn spring-boot:run
# ============================================================

# Base de données — utilisateur dédié, JAMAIS root
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/training_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Pool de connexions
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# Serveur
server.port=8081
server.servlet.context-path=/api
server.forward-headers-strategy=framework

# JWT — secret uniquement depuis variable d'environnement
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Email SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

app.mail.from=${MAIL_USERNAME}
app.mail.from-name=Excellent Training
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging — INFO en prod, jamais DEBUG/SQL
logging.level.org.springframework.security=WARN
logging.level.com.isi.gf=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.sun.mail=WARN
logging.level.javax.mail=WARN
logging.level.org.springframework.mail=WARN